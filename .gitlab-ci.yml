include:
  - project: sysadmin/ci-utilities
    file:
      - /gitlab-templates/reuse-lint.yml
      - /gitlab-templates/blocks/ci-linux-base.yml

deploy:
  extends: .suse_tumbleweed_qt6stable_docker
  stage: deploy
  interruptible: true
  variables:
    KDECI_CC_CACHE: /mnt/$KDECI_PLATFORM_PATH/caches/
    KDECI_CACHE_PATH: /mnt/$KDECI_PLATFORM_PATH/artifacts/
    KDECI_GITLAB_SERVER: https://invent.kde.org/
    KDECI_PACKAGE_PROJECT: teams/ci-artifacts/$KDECI_PLATFORM_PATH
    SGML_CATALOG_FILES: $CI_PROJECT_DIR/_install/share/kf6/kdoctools/customization/catalog.xml:/usr/share/sgml/docbook/dtd/xml/4.5/docbook.dtd
    DBLATEX_BASE_DIR: $CI_PROJECT_DIR/docs-kde-org
  before_script:
    - git clone https://invent.kde.org/websites/docs-kde-org.git --depth=1
    - git clone https://invent.kde.org/sysadmin/ci-utilities.git --depth=1
    - git clone https://invent.kde.org/sysadmin/repo-metadata.git ci-utilities/repo-metadata/ --depth=1
  script:
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - python3 -u ci-utilities/run-ci-build.py --project $CI_PROJECT_NAME --branch $CI_COMMIT_REF_NAME --platform Linux/Qt6/Shared
    - source _build/prefix.sh
    - ./generate_all_html.sh
    - ./generate_all_pdf.sh
  artifacts:
    expire_in: 2 weeks
    when: always
    paths:
      - "pdf_generated"
      - "html_generated"
